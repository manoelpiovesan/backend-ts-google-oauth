services:

  ##############
  # PostgreSQL #
  ##############
  postgres:
    image: postgres:15
    container_name: backend_node_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_node_network


volumes:
  pgdata:

networks:
  backend_node_network:
    driver: bridge
